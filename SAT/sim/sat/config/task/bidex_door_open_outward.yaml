
name: BiDex_ShadowHandOver

task_name: ShadowHandOver

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    point_cloud:
      shape: [512, 3]
      type: point_cloud
    image:
        shape: [3, 256, 256]
        type: rgb
    agent_pos:
      shape: [417]
      type: low_dim
  action:
    shape: [52]

env_runner:
  _target_: sat.env_runner.bidex_runner.BiDexRunner
  n_train: 20
  max_steps: 50
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 10
  task_name: ShadowHandOver

dataset:
  _target_: sat.dataset.bidex_dataset.BiDexDataset
  # zarr_path: data/dexart_bucket_expert.zarr
  zarr_path: /aiarena/gpfs/vla/3D-Diffusion-Policy/third_party/DexterousHands/collect_dataset/bidex_ShadowHandDoorOpenOutward.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 90
